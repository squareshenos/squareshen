<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to squareshen space!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #0a0a0f;
      font-family: 'Orbitron', sans-serif;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .content {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      text-align: center;
      pointer-events: none;
    }

    .title {
      font-size: clamp(1.5rem, 5vw, 3.5rem);
      font-weight: 900;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-shadow: 
        0 0 10px rgba(0, 245, 255, 0.8),
        0 0 20px rgba(0, 245, 255, 0.6),
        0 0 40px rgba(0, 245, 255, 0.4),
        0 0 80px rgba(191, 0, 255, 0.3);
      animation: titleGlow 3s ease-in-out infinite, titleFadeIn 2s ease-out forwards;
      background: linear-gradient(
        90deg,
        #00f5ff,
        #bf00ff,
        #ff006e,
        #00f5ff
      );
      background-size: 300% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    @keyframes titleGlow {
      0%, 100% {
        filter: drop-shadow(0 0 20px rgba(0, 245, 255, 0.8));
      }
      50% {
        filter: drop-shadow(0 0 40px rgba(191, 0, 255, 0.9));
      }
    }

    @keyframes titleFadeIn {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .subtitle {
      margin-top: 1rem;
      font-size: clamp(0.6rem, 1.5vw, 1rem);
      font-weight: 400;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.3em;
      animation: subtitleFadeIn 2s ease-out 0.5s forwards;
      opacity: 0;
    }

    @keyframes subtitleFadeIn {
      0% {
        opacity: 0;
      }
      100% {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="content">
    <h1 class="title">welcome to squareshen space!</h1>
    <p class="subtitle">EXPLORE · CREATE · INNOVATE</p>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let width, height;
    let particles = [];
    let animationId;

    const PARTICLE_COUNT = window.innerWidth < 768 ? 50 : 100;
    const CONNECTION_DISTANCE = 120;
    const PARTICLE_SIZE_MIN = 2;
    const PARTICLE_SIZE_MAX = 4;
    const AGGREGATION_STRENGTH = 0.02;
    const REPULSION_STRENGTH = 0.5;

    const colors = [
      { h: 187, s: 100, l: 50 },  // 青色 #00f5ff
      { h: 286, s: 100, l: 50 },  // 紫色 #bf00ff
      { h: 338, s: 100, l: 47 }   // 粉色 #ff006e
    ];

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function lerpColor(color1, color2, t) {
      return {
        h: lerp(color1.h, color2.h, t),
        s: lerp(color1.s, color2.s, t),
        l: lerp(color1.l, color2.l, t)
      };
    }

    function getGradientColor(time) {
      const t = (Math.sin(time * 0.001) + 1) / 2;
      const colorIndex = Math.floor(t * colors.length) % colors.length;
      const nextColorIndex = (colorIndex + 1) % colors.length;
      const localT = (t * colors.length) % 1;
      return lerpColor(colors[colorIndex], colors[nextColorIndex], localT);
    }

    class Particle {
      constructor() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.size = Math.random() * (PARTICLE_SIZE_MAX - PARTICLE_SIZE_MIN) + PARTICLE_SIZE_MIN;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = (Math.random() - 0.5) * 0.5;
        this.baseX = this.x;
        this.baseY = this.y;
        this.phase = Math.random() * Math.PI * 2;
        this.aggregationPhase = Math.random() * Math.PI * 2;
        this.aggregationTimer = 0;
        this.isAggregating = false;
      }

      update(time) {
        this.aggregationTimer += 0.016;

        if (this.aggregationTimer > 5 + Math.random() * 3) {
          this.isAggregating = !this.isAggregating;
          this.aggregationTimer = 0;
        }

        if (this.isAggregating) {
          const centerX = width / 2 + Math.sin(time * 0.0005 + this.phase) * 100;
          const centerY = height / 2 + Math.cos(time * 0.0003 + this.phase) * 100;
          const dx = centerX - this.x;
          const dy = centerY - this.y;
          this.vx += dx * AGGREGATION_STRENGTH * 0.1;
          this.vy += dy * AGGREGATION_STRENGTH * 0.1;
        } else {
          this.vx += (Math.random() - 0.5) * 0.1;
          this.vy += (Math.random() - 0.5) * 0.1;
          
          const dx = this.x - this.baseX;
          const dy = this.y - this.baseY;
          this.vx -= dx * REPULSION_STRENGTH * 0.01;
          this.vy -= dy * REPULSION_STRENGTH * 0.01;
        }

        this.vx *= 0.98;
        this.vy *= 0.98;

        const maxSpeed = 2;
        const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
        if (speed > maxSpeed) {
          this.vx = (this.vx / speed) * maxSpeed;
          this.vy = (this.vy / speed) * maxSpeed;
        }

        this.x += this.vx;
        this.y += this.vy;

        if (this.x < 0) this.x = width;
        if (this.x > width) this.x = 0;
        if (this.y < 0) this.y = height;
        if (this.y > height) this.y = 0;

        this.baseX = lerp(this.baseX, this.x, 0.01);
        this.baseY = lerp(this.baseY, this.y, 0.01);
      }

      draw(time) {
        const gradientColor = getGradientColor(time + this.phase * 1000);
        const alpha = 0.6 + Math.sin(time * 0.003 + this.phase) * 0.3;
        
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${gradientColor.h}, ${gradientColor.s}%, ${gradientColor.l}%, ${alpha})`;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
        const glowGradient = ctx.createRadialGradient(
          this.x, this.y, 0,
          this.x, this.y, this.size * 2
        );
        glowGradient.addColorStop(0, `hsla(${gradientColor.h}, ${gradientColor.s}%, ${gradientColor.l}%, ${alpha * 0.5})`);
        glowGradient.addColorStop(1, 'transparent');
        ctx.fillStyle = glowGradient;
        ctx.fill();
      }
    }

    function drawConnections(time) {
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const distance = Math.sqrt(dx * dx + dy * dy);

          if (distance < CONNECTION_DISTANCE) {
            const alpha = (1 - distance / CONNECTION_DISTANCE) * 0.3;
            const gradientColor = getGradientColor(time);
            
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `hsla(${gradientColor.h}, ${gradientColor.s}%, ${gradientColor.l}%, ${alpha})`;
            ctx.lineWidth = 1;
            ctx.stroke();
          }
        }
      }
    }

    function drawFlowLight(time) {
      const gradientColor = getGradientColor(time);
      const x = (Math.sin(time * 0.001) + 1) / 2 * width;
      const y = (Math.cos(time * 0.0007) + 1) / 2 * height;
      
      const glowRadius = 150;
      const gradient = ctx.createRadialGradient(x, y, 0, x, y, glowRadius);
      gradient.addColorStop(0, `hsla(${gradientColor.h}, ${gradientColor.s}%, ${gradientColor.l}%, 0.1)`);
      gradient.addColorStop(0.5, `hsla(${gradientColor.h}, ${gradientColor.s}%, ${gradientColor.l}%, 0.03)`);
      gradient.addColorStop(1, 'transparent');
      
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);
    }

    function animate(time) {
      ctx.fillStyle = 'rgba(10, 10, 15, 0.15)';
      ctx.fillRect(0, 0, width, height);

      drawFlowLight(time);
      drawConnections(time);

      particles.forEach(particle => {
        particle.update(time);
        particle.draw(time);
      });

      animationId = requestAnimationFrame(animate);
    }

    function init() {
      resize();
      particles = [];
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push(new Particle());
      }
      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, width, height);
      animate(0);
    }

    window.addEventListener('resize', () => {
      resize();
    });

    init();
  </script>
</body>
</html>
